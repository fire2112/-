<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>杰克船长的魔法罗盘 · 分享版</title>
    <!-- 引入 html2canvas 用于长图生成 -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #1a0f07;
            --gold: #c9a050;
            --text: #2c1810;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Georgia', 'Noto Serif SC', serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .main-container {
            max-width: 420px; width:100%;
            display:flex; flex-direction:column; align-items:center; gap:20px;
        }
        .mini-compass {
            position: relative;
            width: 120px; height: 120px;
            margin: 0 auto;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
        }
        .mini-compass canvas {
            width: 100%; height: 100%;
            display: block;
            border-radius: 50%;
        }
        .card {
            background: #f4e4c1;
            border-radius: 16px;
            padding: 24px 20px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 3px solid #b8945c;
            text-align: center;
        }
        .question-text {
            font-size: 18px;
            color: #2c1810;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .question-sub {
            font-size: 13px;
            color: #6b4f10;
            margin-bottom: 18px;
            font-style: italic;
        }
        .option-btn {
            display: block;
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 10px;
            background: #fffef9;
            border: 2px solid #c9a050;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
        }
        .option-btn:active {
            transform: scale(0.96);
            background: #fde8b0;
        }
        .compass-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .compass-wrapper canvas {
            display: block;
            border-radius: 50%;
        }
        .hidden { display: none !important; }
        .result-card {
            background: #f4e4c1;
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            border: 3px solid #b8945c;
            text-align: center;
            position: relative;
        }
        .risk-badge {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            margin: 8px 0;
        }
        .risk-low { background:#d4edda; color:#1a5c2a; }
        .risk-mid { background:#fff3cd; color:#6b4f10; }
        .risk-high { background:#fce4e4; color:#8b2020; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%,100%{ box-shadow:0 0 0 rgba(200,40,40,0.3) }
            50%{ box-shadow:0 0 20px rgba(200,40,40,0.7) }
        }
        .btn-restart, .btn-share {
            margin-top: 12px;
            padding: 12px 24px;
            background: #c9a050;
            color: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 1px;
            display: inline-block;
            margin-right: 8px;
        }
        .btn-share {
            background: #5c3a1e;
        }
        .progress-dots {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 16px;
        }
        .progress-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #d4b896;
            border: 1px solid #b8945c;
        }
        .progress-dot.active { background:#c9a050; transform:scale(1.3); }
        .progress-dot.done { background:#8b6914; }
        .quote {
            font-style: italic;
            margin-top: 12px;
            color: #5c3a2e;
            border-top: 1px dashed #c9a050;
            padding-top: 10px;
            font-size: 14px;
        }
        /* 分享图容器 (隐藏，用于截图) */
        #shareContainer {
            position: fixed;
            left: -9999px;
            top: 0;
            width: 400px;
            background: #f4e4c1 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path d="M10 10 L90 10 L90 90 L10 90 Z" fill="none" stroke="%23d4b896" stroke-width="2" stroke-dasharray="5 5"/></svg>') repeat;
            padding: 20px;
            font-family: 'Georgia', 'Noto Serif SC', serif;
            color: #2c1810;
            text-align: center;
            border: 6px double #b8945c;
            box-shadow: 0 0 0 4px #4a2210;
        }
        #shareContainer .share-header {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #shareContainer .share-compass {
            margin: 10px auto;
            width: 200px;
            height: 200px;
        }
        #shareContainer .share-advice {
            font-size: 16px;
            margin: 12px 0;
            padding: 8px;
            background: rgba(255,255,240,0.7);
            border-radius: 8px;
        }
        #shareContainer .share-quote {
            font-style: italic;
            margin-top: 10px;
            border-top: 1px dashed #b8945c;
            padding-top: 8px;
        }
        #shareContainer .signature {
            margin-top: 20px;
            text-align: right;
            font-family: 'Brush Script MT', cursive;
            font-size: 20px;
            color: #5c3a2e;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <h1 style="color:#e0c878; text-align:center; letter-spacing:2px;">🏴‍☠️ 杰克船长的魔法罗盘</h1>
        </div>

        <div class="mini-compass" id="miniCompassContainer">
            <canvas id="miniCompassCanvas" width="120" height="120"></canvas>
        </div>

        <div class="card" id="questionCard">
            <div class="question-text" id="questionText"></div>
            <div class="question-sub" id="questionSub"></div>
            <div id="optionsContainer"></div>
            <div class="progress-dots" id="progressDots">
                <span class="progress-dot"></span><span class="progress-dot"></span><span class="progress-dot"></span><span class="progress-dot"></span><span class="progress-dot"></span>
            </div>
        </div>

        <div class="compass-wrapper hidden" id="compassWrapper">
            <canvas id="compassCanvas" width="300" height="300"></canvas>
        </div>

        <div class="result-card hidden" id="resultCard">
            <div style="font-size:48px;" id="resultIcon"></div>
            <h2 id="resultTitle" style="color:#2c1810;"></h2>
            <span class="risk-badge" id="riskBadge"></span>
            <p id="resultAdvice" style="margin-top:12px; color:#3a1f0b; font-size:15px;"></p>
            <p class="quote" id="randomQuote"></p>
            <button class="btn-restart" id="btnRestart">🔄 再问一次罗盘</button>
            <button class="btn-share" id="btnShare">📜 生成航海日志</button>
        </div>
    </div>

    <!-- 隐藏的分享图绘制区 -->
    <div id="shareContainer">
        <div class="share-header">杰克船长的航海日志</div>
        <div id="shareCompassCanvas" class="share-compass"></div>
        <div id="shareSector"></div>
        <div id="shareRisk"></div>
        <div class="share-advice" id="shareAdvice"></div>
        <div class="share-quote" id="shareQuote"></div>
        <div class="signature">—— Captain Jack Sparrow</div>
    </div>

    <script>
        (function() {
            // ----- 问题库 -----
            const questionPool = [
                [{
                    text: '你今天的精力与情绪状态如何？',
                    sub: '（海上的天气）',
                    options: [
                        { text: '☀️ 精力充沛，心情明朗', value: 4 },
                        { text: '⛅ 还算平稳，偶有波动', value: 3 },
                        { text: '🌫️ 有些疲惫，提不起劲', value: 2 },
                        { text: '⛈️ 情绪低落，十分倦怠', value: 1 }
                    ]
                }, {
                    text: '此刻你的内心感受更接近？',
                    sub: '（海面状况）',
                    options: [
                        { text: '🌟 平静且充满希望', value: 4 },
                        { text: '🌤️ 有点小波澜，总体还好', value: 3 },
                        { text: '🌥️ 阴云笼罩，说不出的闷', value: 2 },
                        { text: '🌧️ 狂风暴雨，快撑不住了', value: 1 }
                    ]
                }],
                [{
                    text: '昨晚睡得怎么样？',
                    sub: '（你的锚抛得稳吗）',
                    options: [
                        { text: '💤 睡得深沉，一觉天亮', value: 4 },
                        { text: '🛏️ 还不错，基本解乏', value: 3 },
                        { text: '🥱 浅睡多梦，不够踏实', value: 2 },
                        { text: '😵 几乎没睡，整夜折腾', value: 1 }
                    ]
                }, {
                    text: '今早醒来时的感觉？',
                    sub: '（锚链是否拉紧）',
                    options: [
                        { text: '⚓ 精神饱满，像新的一样', value: 4 },
                        { text: '🔔 稍有困意，但能应付', value: 3 },
                        { text: '⏰ 闹钟叫了无数次才醒', value: 2 },
                        { text: '💀 起床如同地狱难度', value: 1 }
                    ]
                }],
                [{
                    text: '今天要做的事有明确计划吗？',
                    sub: '（藏宝图清晰吗）',
                    options: [
                        { text: '🗺️ 详细规划，按图索骥', value: 4 },
                        { text: '📝 大致有数，边做边调', value: 3 },
                        { text: '🔍 只有模糊想法', value: 2 },
                        { text: '💧 一片空白，无从下手', value: 1 }
                    ]
                }, {
                    text: '面对今天的任务，你的心态是？',
                    sub: '（地图完整度）',
                    options: [
                        { text: '🎯 目标清晰，信心满满', value: 4 },
                        { text: '🧭 方向感还好，慢慢来', value: 3 },
                        { text: '🌫️ 有点迷茫，走一步看一步', value: 2 },
                        { text: '🏝️ 彻底迷失，等待救援', value: 1 }
                    ]
                }],
                [{
                    text: '最近有烦心事在困扰你吗？',
                    sub: '（有塞壬的歌声吗）',
                    options: [
                        { text: '🌈 没有，内心很安静', value: 4 },
                        { text: '🎵 有一点，但不影响大局', value: 3 },
                        { text: '🎶 时常走神，有些困扰', value: 2 },
                        { text: '🚨 烦恼缠身，无法专注', value: 1 }
                    ]
                }, {
                    text: '外界的干扰或诱惑多么？',
                    sub: '（海妖的召唤）',
                    options: [
                        { text: '🤫 几乎为零，我能专注', value: 4 },
                        { text: '📱 偶有手机/琐事打断', value: 3 },
                        { text: '🧜 有不少诱惑在拉扯我', value: 2 },
                        { text: '📢 四面八方都在呼唤我', value: 1 }
                    ]
                }],
                [{
                    text: '直觉告诉你今天运气如何？',
                    sub: '（今天的风向）',
                    options: [
                        { text: '💨 顺风顺水，诸事皆宜', value: 4, wind: 'tailwind' },
                        { text: '🌬️ 需要调整，但有利可图', value: 3, wind: 'crosswind' },
                        { text: '🌀 时好时坏，捉摸不定', value: 2, wind: 'shifting' },
                        { text: '🌪️ 逆风而行，困难重重', value: 1, wind: 'headwind' }
                    ]
                }, {
                    text: '对于今天将发生的事，你预感？',
                    sub: '（船帆感受到的风）',
                    options: [
                        { text: '🍀 会有惊喜，充满期待', value: 4, wind: 'tailwind' },
                        { text: '⚖️ 无功无过，平平淡淡', value: 3, wind: 'crosswind' },
                        { text: '❓ 说不准，可能高开低走', value: 2, wind: 'shifting' },
                        { text: '⚠️ 隐隐不安，多加小心', value: 1, wind: 'headwind' }
                    ]
                }]
            ];

            let currentQuestions = [];
            let currentQ = 0;
            let answers = [];
            let totalScore = 0;
            let windAnswer = 'tailwind';
            let isAnimating = false;

            const questionCard = document.getElementById('questionCard');
            const questionText = document.getElementById('questionText');
            const questionSub = document.getElementById('questionSub');
            const optionsContainer = document.getElementById('optionsContainer');
            const compassWrapper = document.getElementById('compassWrapper');
            const compassCanvas = document.getElementById('compassCanvas');
            const resultCard = document.getElementById('resultCard');
            const ctx = compassCanvas.getContext('2d');

            let pointerAngle = -90;
            let canvasSize = 300;

            // 小罗盘
            const miniCanvas = document.getElementById('miniCompassCanvas');
            const miniCtx = miniCanvas.getContext('2d');
            const miniSize = 120;
            miniCanvas.width = miniSize * 2;
            miniCanvas.height = miniSize * 2;
            miniCtx.scale(2, 2);
            let miniAngle = 0;
            let miniAnimFrame;

            function drawMiniCompass(angleDeg) {
                const cx = miniSize/2, cy = miniSize/2;
                const r = miniSize/2 - 4;
                miniCtx.clearRect(0, 0, miniSize, miniSize);
                miniCtx.beginPath(); miniCtx.arc(cx, cy, r, 0, Math.PI*2);
                miniCtx.fillStyle = '#4a2210'; miniCtx.fill(); miniCtx.strokeStyle='#2a1005'; miniCtx.lineWidth=2; miniCtx.stroke();
                for(let i=0; i<8; i++){
                    const start = (i/8)*Math.PI*2 - Math.PI/2 - Math.PI/8;
                    const end = start + Math.PI/4;
                    miniCtx.beginPath(); miniCtx.moveTo(cx,cy); miniCtx.arc(cx,cy, r-6, start, end);
                    miniCtx.fillStyle = i%2===0 ? '#fdf5e6' : '#e8d0a8'; miniCtx.fill(); miniCtx.strokeStyle='#b8945c'; miniCtx.stroke();
                }
                miniCtx.beginPath(); miniCtx.arc(cx, cy, r-18, 0, Math.PI*2);
                miniCtx.fillStyle = '#c9a050'; miniCtx.fill(); miniCtx.stroke();
                miniCtx.save(); miniCtx.translate(cx, cy); miniCtx.rotate(angleDeg * Math.PI/180);
                miniCtx.beginPath(); miniCtx.moveTo(0, -8); miniCtx.lineTo(-4, -18); miniCtx.lineTo(0, -r+14); miniCtx.lineTo(4, -18); miniCtx.closePath();
                miniCtx.fillStyle = '#2c1810'; miniCtx.fill(); miniCtx.strokeStyle='#f4e4c1'; miniCtx.lineWidth=1; miniCtx.stroke();
                miniCtx.beginPath(); miniCtx.arc(0, -12, 5, 0, Math.PI*2); miniCtx.fillStyle='#fdf5e6'; miniCtx.fill();
                miniCtx.restore();
            }

            function spinMiniCompass() {
                miniAngle = (miniAngle + 1.8) % 360;
                drawMiniCompass(miniAngle);
                miniAnimFrame = requestAnimationFrame(spinMiniCompass);
            }

            // 主罗盘
            function updateCanvasSize() {
                const maxSize = 340;
                const fallback = Math.min(window.innerWidth * 0.9, maxSize);
                const w = compassWrapper.classList.contains('hidden') ? fallback : (compassWrapper.clientWidth || fallback);
                canvasSize = Math.min(w, maxSize);
                if (canvasSize < 100) canvasSize = 300;
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                compassCanvas.style.width = canvasSize + 'px';
                compassCanvas.style.height = canvasSize + 'px';
                compassCanvas.width = canvasSize * dpr;
                compassCanvas.height = canvasSize * dpr;
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);
            }

            function drawCompass() {
                const size = canvasSize;
                const cx = size/2, cy = size/2;
                const outerR = size/2 - 10;
                ctx.clearRect(0, 0, size, size);
                ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI*2);
                ctx.fillStyle = '#4a2210'; ctx.fill(); ctx.strokeStyle='#2a1005'; ctx.lineWidth=4; ctx.stroke();

                const sectors = ['创造','冒险','行动','稳健','谨慎','沉静','迷雾','藏金'];
                const colors = ['#fdf5e6','#e8d0a8'];
                const outerSectorR = outerR - 16;
                const innerSectorR = outerR - 45;
                const textRadius = (outerSectorR + innerSectorR) / 2;

                for(let i=0; i<8; i++){
                    const start = (i/8)*Math.PI*2 - Math.PI/2 - Math.PI/8;
                    const end = start + Math.PI/4;
                    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy, outerSectorR, start, end);
                    ctx.fillStyle = colors[i%2]; ctx.fill(); ctx.strokeStyle='#b8945c'; ctx.stroke();

                    const mid = start + Math.PI/8;
                    const tx = cx + textRadius * Math.cos(mid);
                    const ty = cy + textRadius * Math.sin(mid);
                    ctx.save();
                    ctx.translate(tx, ty);
                    ctx.rotate(mid + Math.PI/2);
                    ctx.fillStyle = '#2c1810';
                    ctx.font = `bold ${Math.max(13, size/24)}px "Georgia", "Noto Serif SC", serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(sectors[i], 0, 0);
                    ctx.restore();
                }

                ctx.beginPath(); ctx.arc(cx, cy, innerSectorR, 0, Math.PI*2);
                ctx.fillStyle = '#e0c878'; ctx.fill(); ctx.strokeStyle='#6b4f10'; ctx.lineWidth=2; ctx.stroke();

                ctx.save(); ctx.translate(cx, cy); ctx.rotate(pointerAngle * Math.PI/180);
                ctx.beginPath(); ctx.moveTo(0, -18); ctx.lineTo(-6, -30); ctx.lineTo(0, -outerR+18); ctx.lineTo(6, -30); ctx.closePath();
                ctx.fillStyle = '#c9a050'; ctx.fill(); ctx.strokeStyle='#3a1808'; ctx.lineWidth=2; ctx.stroke();
                ctx.beginPath(); ctx.arc(0, -24, 7, 0, Math.PI*2); ctx.fillStyle='#fdf5e6'; ctx.fill(); ctx.stroke();
                ctx.restore();
            }

            function renderMainCompass() {
                updateCanvasSize();
                drawCompass();
            }

            function pickQuestions() {
                currentQuestions = questionPool.map(pool => pool[Math.floor(Math.random() * pool.length)]);
            }

            function updateProgressDots() {
                const dots = document.querySelectorAll('.progress-dot');
                dots.forEach((dot, i) => {
                    dot.classList.remove('active', 'done');
                    if (i < currentQ) dot.classList.add('done');
                    if (i === currentQ) dot.classList.add('active');
                });
            }

            function renderQuestion() {
                if (currentQ >= currentQuestions.length) {
                    finishQuestions();
                    return;
                }
                const q = currentQuestions[currentQ];
                questionText.textContent = q.text;
                questionSub.textContent = q.sub || '';
                optionsContainer.innerHTML = '';
                q.options.forEach((opt) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt.text;
                    btn.addEventListener('click', () => selectOption(opt));
                    optionsContainer.appendChild(btn);
                });
                updateProgressDots();
            }

            function selectOption(opt) {
                if (isAnimating) return;
                isAnimating = true;
                answers[currentQ] = opt.value;
                if (currentQ === 4 && opt.wind) windAnswer = opt.wind;
                totalScore = answers.reduce((a,b)=>a+b, 0);
                currentQ++;
                setTimeout(() => {
                    isAnimating = false;
                    renderQuestion();
                }, 300);
            }

            function finishQuestions() {
                questionCard.classList.add('hidden');
                compassWrapper.classList.remove('hidden');
                updateCanvasSize();
                drawCompass();
                let targetAngle;
                if (totalScore >= 19) targetAngle = -50;
                else if (totalScore >= 17) targetAngle = -5;
                else if (totalScore >= 15) targetAngle = 40;
                else if (totalScore >= 13) targetAngle = 85;
                else if (totalScore >= 11) targetAngle = 130;
                else if (totalScore >= 9) targetAngle = 175;
                else if (totalScore >= 7) targetAngle = 220;
                else targetAngle = 265;

                let startAngle = pointerAngle;
                let startTime = null;
                function spin(ts) {
                    if (!startTime) startTime = ts;
                    const progress = Math.min(1, (ts-startTime)/2500);
                    pointerAngle = startAngle + (targetAngle - startAngle) * (1 - Math.pow(1-progress, 3));
                    drawCompass();
                    if (progress < 1) requestAnimationFrame(spin);
                    else {
                        pointerAngle = targetAngle;
                        drawCompass();
                        setTimeout(showResult, 400);
                    }
                }
                requestAnimationFrame(spin);
            }

            // 存储结果数据供分享使用
            let lastResultData = {};

            function showResult() {
                compassWrapper.classList.add('hidden');
                resultCard.classList.remove('hidden');
                let sector, icon, riskClass, riskText, baseAdvices;
                if (totalScore >= 19) {
                    sector = '创造之风'; icon = '✨'; riskClass = 'risk-low'; riskText = '吉兆 · 低风险';
                    baseAdvices = ['灵感如海风清新，大胆创作，你的作品会像黑珍珠号一样独一无二。','创意喷涌，启动艺术项目或写下奇思妙想，别让灵感溜走。','罗盘指向创造，今天试试那些疯狂的点子吧。'];
                } else if (totalScore >= 17) {
                    sector = '冒险之海'; icon = '🗺️'; riskClass = 'risk-low'; riskText = '机遇 · 可探索';
                    baseAdvices = ['远方有宝藏，适合探索或学新技能，带上勇气和朗姆酒。','冒险旗帜飘扬，尝试从未做过的事，未知带来惊喜。','今天适合打破常规，小小冒险为生活注入活力。'];
                } else if (totalScore >= 15) {
                    sector = '行动之帆'; icon = '⛵'; riskClass = 'risk-low'; riskText = '动能 · 宜推进';
                    baseAdvices = ['顺风已至，一口气完成积压任务，效率极高。','行动力爆棚，推进项目、运动或整理杂物，让一切运转。','别再犹豫，想到就去做，执行力是最好的武器。'];
                } else if (totalScore >= 13) {
                    sector = '稳健之锚'; icon = '⚓'; riskClass = 'risk-mid'; riskText = '平稳 · 宜守成';
                    baseAdvices = ['海流平稳，按部就班完成计划，不要画蛇添足。','巩固已有成果，检查细节，稳扎稳打才能长久。','保持节奏，不冒进不懈怠，平凡一天也能积累宝藏。'];
                } else if (totalScore >= 11) {
                    sector = '谨慎之礁'; icon = '⚠️'; riskClass = 'risk-mid'; riskText = '暗流 · 需警惕';
                    baseAdvices = ['前方有暗礁，小心财务决策，重要文件多看两遍。','不宜冒险，投资消费格外慎重，安全第一。','注意人际关系小摩擦，退一步海阔天空。'];
                } else if (totalScore >= 9) {
                    sector = '沉静之湾'; icon = '🌊'; riskClass = 'risk-mid'; riskText = '休整 · 宜静思';
                    baseAdvices = ['湾内平静，适合休息、冥想或读好书，让心灵靠岸。','不要强迫自己高速运转，蓄力才能远航。','适合反思和规划，放下杂念，听听内心声音。'];
                } else if (totalScore >= 7) {
                    sector = '迷雾之域'; icon = '🌫️'; riskClass = 'risk-mid'; riskText = '朦胧 · 宜观望';
                    baseAdvices = ['海雾弥漫，重要决定不妨推迟，等待雾散。','可能感到迷茫，收集信息比贸然行动更明智。','多询问信任的人，他们的建议是你的灯塔。'];
                } else {
                    sector = '藏金之渊'; icon = '🪙'; riskClass = 'risk-high'; riskText = '警示 · 守财为重';
                    baseAdvices = ['罗盘指向藏金之渊，宝藏诱人但暗流汹涌。务必管好钱包，避免冲动消费和高风险投资。','财帛之星闪烁不定，谨防诈骗和诱惑，守成是最好的进攻。','深渊藏金亦藏险，取消不必要开支，谨慎前行才能满载而归。'];
                }
                let windIdx = 0;
                if (windAnswer === 'crosswind') windIdx = 1;
                else if (windAnswer === 'shifting') windIdx = 2;
                else if (windAnswer === 'headwind') windIdx = 0;
                const finalAdvice = baseAdvices[windIdx] || baseAdvices[0];

                const quotes = [
                    "“不是所有的宝藏都是金银，有时候，一个明智的指引更为珍贵。”",
                    "“风向不对时，最好的帆就是耐心。”",
                    "“朗姆酒要慢慢喝，决定要快快做。”",
                    "“恐惧是六海之中最大的风暴。”",
                    "“藏宝图再清晰，也不如一双懂得观察的眼睛。”",
                    "“冒险可能会让你湿身，但不会让你沉没。”",
                    "“聪明的海盗知道何时拔锚，何时抛锚。”",
                    "“别和塞壬讨价还价，她们的利息是你的理智。”",
                    "“今天的谨慎是明天的宝藏。”",
                    "“罗盘只能指方向，路得你自己走。”",
                    "“真正的水手在暴风雨中学会跳舞。”",
                    "“如果船要沉，至少抱着金子上岸。”",
                    "“海怪并不可怕，可怕的是没有罗盘的航行。”",
                    "“有时最勇敢的事就是原地不动。”",
                    "“你的心就是最好的魔法罗盘。”"
                ];
                const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];

                document.getElementById('resultIcon').textContent = icon;
                document.getElementById('resultTitle').textContent = sector;
                const badge = document.getElementById('riskBadge');
                badge.textContent = riskText;
                badge.className = 'risk-badge ' + riskClass;
                document.getElementById('resultAdvice').textContent = finalAdvice;
                document.getElementById('randomQuote').textContent = randomQuote;

                // 保存结果数据供分享
                lastResultData = {
                    sector, icon, riskText, finalAdvice, randomQuote, pointerAngle
                };
            }

            // ----- 长图分享功能 -----
            function generateShareImage() {
                if (!lastResultData.sector) return;
                // 填充隐藏的分享容器
                const shareContainer = document.getElementById('shareContainer');
                document.getElementById('shareSector').innerHTML = `<span style="font-size:48px;">${lastResultData.icon}</span><br><strong style="font-size:20px;">${lastResultData.sector}</strong>`;
                document.getElementById('shareRisk').innerHTML = `<span style="background:#fce4e4; color:#8b2020; padding:4px 16px; border-radius:20px;">${lastResultData.riskText}</span>`;
                document.getElementById('shareAdvice').textContent = lastResultData.finalAdvice;
                document.getElementById('shareQuote').textContent = lastResultData.randomQuote;

                // 绘制分享罗盘（静态）
                const shareCompassDiv = document.getElementById('shareCompassCanvas');
                shareCompassDiv.innerHTML = '<canvas id="shareCanvas" width="200" height="200"></canvas>';
                const shareCanvas = document.getElementById('shareCanvas');
                const shareCtx = shareCanvas.getContext('2d');
                const shareSize = 200;
                const shareCx = shareSize/2, shareCy = shareSize/2;
                const shareOuterR = shareSize/2 - 6;
                // 简单重绘罗盘
                shareCtx.clearRect(0,0,shareSize,shareSize);
                shareCtx.beginPath(); shareCtx.arc(shareCx, shareCy, shareOuterR, 0, Math.PI*2);
                shareCtx.fillStyle = '#4a2210'; shareCtx.fill(); shareCtx.strokeStyle='#2a1005'; shareCtx.lineWidth=2; shareCtx.stroke();
                const sectors = ['创造','冒险','行动','稳健','谨慎','沉静','迷雾','藏金'];
                for(let i=0; i<8; i++){
                    const start = (i/8)*Math.PI*2 - Math.PI/2 - Math.PI/8;
                    const end = start + Math.PI/4;
                    shareCtx.beginPath(); shareCtx.moveTo(shareCx,shareCy); shareCtx.arc(shareCx,shareCy, shareOuterR-8, start, end);
                    shareCtx.fillStyle = i%2===0 ? '#fdf5e6' : '#e8d0a8'; shareCtx.fill(); shareCtx.stroke();
                }
                shareCtx.save(); shareCtx.translate(shareCx, shareCy); shareCtx.rotate(lastResultData.pointerAngle * Math.PI/180);
                shareCtx.beginPath(); shareCtx.moveTo(0, -12); shareCtx.lineTo(-5, -22); shareCtx.lineTo(0, -shareOuterR+14); shareCtx.lineTo(5, -22); shareCtx.closePath();
                shareCtx.fillStyle = '#c9a050'; shareCtx.fill(); shareCtx.strokeStyle='#3a1808'; shareCtx.stroke();
                shareCtx.restore();

                // 用 html2canvas 截图
                setTimeout(() => {
                    html2canvas(shareContainer, {
                        backgroundColor: '#f4e4c1',
                        scale: 2,
                        allowTaint: false,
                        useCORS: true
                    }).then(canvas => {
                        // 下载图片
                        const link = document.createElement('a');
                        link.download = '杰克船长的航海日志.png';
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                        // 清理
                        shareCompassDiv.innerHTML = '';
                    }).catch(err => {
                        alert('生成图片失败，请重试或截图保存。');
                        console.error(err);
                    });
                }, 300);
            }

            document.getElementById('btnShare').addEventListener('click', generateShareImage);

            function restart() {
                currentQ = 0; answers = []; totalScore = 0; windAnswer = 'tailwind'; pointerAngle = -90;
                resultCard.classList.add('hidden');
                questionCard.classList.remove('hidden');
                pickQuestions();
                updateCanvasSize();
                drawCompass();
                renderQuestion();
                lastResultData = {};
            }

            document.getElementById('btnRestart').addEventListener('click', restart);

            function init() {
                pickQuestions();
                updateCanvasSize();
                drawCompass();
                renderQuestion();
                spinMiniCompass();
            }

            init();
        })();
    </script>
</body>
</html>
